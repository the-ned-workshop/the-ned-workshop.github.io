<!--
  20" x 12" wood-etch sign for The Ned Workshop.

  ViewBox is 2000 x 1200 (100 px = 1 inch).

  Layout: a 6 x 4 grid of tool icons (2 rows above, 2 rows below the title)
  drawn from the same lucide set used on the homepage quote section. Each
  icon's geometry is inlined directly — no <defs>, no <use>, no <pattern>,
  no <mask>. Illustrator Web silently drops <use href> references and
  reinterprets <pattern>/<mask> on import, so inlining is the only way to
  guarantee the same render across browsers, Illustrator, Inkscape, and
  laser/CNC software.

  Title is rendered as outlined paths in Baloo 2 ExtraBold (the site's
  wordmark font), so it displays identically everywhere without needing the
  font installed.

  Single-color (black) on a white field for universal laser/CNC compatibility.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="20in" height="12in"
     viewBox="0 0 2000 1200">
  <!-- White field (preview only; ignored by most laser jobs) -->
  <rect width="2000" height="1200" fill="white" />

